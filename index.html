<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>책 스캐너</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#5a7a6b">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f7f5f2;
    --card: #ffffff;
    --primary: #5a7a6b;
    --primary-light: #8aad9b;
    --text: #2d3a33;
    --sub: #8e9a92;
    --border: #dde3df;
    --red: #c0392b;
    --radius: 14px;
    --accent: #e8a87c;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 700px;
    margin: 0 auto;
    padding: 16px 16px calc(env(safe-area-inset-bottom, 0px) + 40px);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  header {
    text-align: center;
    padding: 20px 0 16px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--primary);
  }

  header p {
    font-size: 13px;
    color: var(--sub);
    margin-top: 4px;
  }

  .upload-area {
    background: var(--card);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 16px;
  }

  .upload-area:hover,
  .upload-area.dragover {
    border-color: var(--primary);
    background: #f0f5f2;
  }

  .upload-icon { font-size: 40px; margin-bottom: 10px; }

  .upload-text {
    font-size: 15px;
    color: var(--sub);
    line-height: 1.6;
  }

  .upload-text strong { color: var(--primary); }

  .preview-section { display: none; margin-bottom: 16px; }

  .preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding: 0 2px;
  }

  .preview-title { font-size: 15px; font-weight: 700; color: var(--primary); }
  .preview-count { font-size: 13px; color: var(--sub); }

  .preview-list { display: flex; flex-wrap: wrap; gap: 10px; }

  .preview-item {
    position: relative;
    width: 90px;
    height: 120px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--bg);
  }

  .preview-item img { width: 100%; height: 100%; object-fit: cover; }

  .preview-item .page-num {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.5); color: #fff;
    font-size: 11px; text-align: center; padding: 2px;
  }

  .preview-item .remove-btn {
    position: absolute; top: 2px; right: 2px;
    width: 22px; height: 22px; border-radius: 50%;
    border: none; background: rgba(0,0,0,0.5); color: #fff;
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }

  .btn-row { display: flex; gap: 10px; margin-bottom: 16px; }

  .btn {
    flex: 1; padding: 14px; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { opacity: 0.8; }

  .btn-primary {
    background: var(--primary); color: #fff;
    box-shadow: 0 2px 8px rgba(90,122,107,0.2);
  }

  .btn-primary:disabled {
    background: var(--border); color: var(--sub);
    box-shadow: none; cursor: default; opacity: 1;
  }

  .btn-secondary {
    background: var(--card); color: var(--primary);
    border: 1.5px solid var(--border);
  }

  .btn-danger {
    background: var(--card); color: var(--red);
    border: 1.5px solid var(--border);
  }

  .options-section {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    display: none;
  }

  .option-label {
    font-size: 13px;
    color: var(--sub);
    margin-bottom: 8px;
  }

  .option-list { display: flex; gap: 8px; flex-wrap: wrap; }

  .option-btn {
    padding: 7px 16px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--bg);
    color: var(--sub); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }

  .option-btn.selected {
    background: var(--primary); color: #fff;
    border-color: var(--primary);
  }

  .progress-section { display: none; margin-bottom: 16px; }

  .progress-info {
    display: flex; justify-content: space-between;
    font-size: 13px; color: var(--sub); margin-bottom: 6px;
  }

  .progress-bar-wrap {
    height: 8px; background: var(--border);
    border-radius: 4px; overflow: hidden;
  }

  .progress-bar {
    height: 100%; background: var(--primary);
    border-radius: 4px; width: 0%; transition: width 0.3s;
  }

  .progress-status {
    font-size: 13px; color: var(--primary);
    margin-top: 6px; text-align: center; font-weight: 500;
  }

  .result-section { display: none; margin-bottom: 16px; }

  .result-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 10px;
  }

  .result-title { font-size: 15px; font-weight: 700; color: var(--primary); }
  .result-chars { font-size: 13px; color: var(--sub); }

  .result-text {
    width: 100%; min-height: 300px;
    border: 1px solid var(--border); border-radius: 12px;
    padding: 14px; font-size: 15px; font-family: inherit;
    line-height: 1.7; background: var(--card); color: var(--text);
    resize: vertical;
  }

  .result-text:focus { outline: none; border-color: var(--primary-light); }

  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--primary); color: #fff;
    padding: 12px 24px; border-radius: 12px;
    font-size: 14px; font-weight: 500; opacity: 0;
    transition: all 0.3s ease; pointer-events: none;
    z-index: 100; white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0); opacity: 1;
  }

  @media (min-width: 640px) {
    body { padding: 24px 24px 60px; }
    .preview-item { width: 100px; height: 130px; }
  }
</style>
</head>
<body>

<header>
  <h1>책 스캐너</h1>
  <p>책 이미지/PDF를 텍스트로 변환합니다</p>
</header>

<!-- 업로드 -->
<div class="upload-area" id="uploadArea">
  <div class="upload-icon">&#128214;</div>
  <div class="upload-text">
    <strong>파일을 선택</strong>하거나 여기에 끌어다 놓으세요<br>
    이미지 (JPG, PNG, WEBP) 또는 PDF — 여러 장 가능
  </div>
  <input type="file" id="fileInput" accept="image/*,.pdf" multiple hidden>
</div>

<!-- 이미지 미리보기 -->
<div class="preview-section" id="previewSection">
  <div class="preview-header">
    <span class="preview-title">선택한 페이지</span>
    <span class="preview-count" id="previewCount"></span>
  </div>
  <div class="preview-list" id="previewList"></div>

  <div class="btn-row" style="margin-top: 14px;">
    <button class="btn btn-secondary" id="addMoreBtn">파일 추가</button>
    <button class="btn btn-danger" id="clearBtn">전체 삭제</button>
  </div>
</div>

<!-- 옵션 -->
<div class="options-section" id="optionsSection">
  <div class="option-label">텍스트 언어</div>
  <div class="option-list" id="langList">
    <button class="option-btn selected" data-lang="kor+eng">한국어+영어</button>
    <button class="option-btn" data-lang="kor">한국어만</button>
    <button class="option-btn" data-lang="eng">영어만</button>
  </div>

  <div class="option-label" style="margin-top: 14px;">다운로드 형식</div>
  <div class="option-list" id="formatList">
    <button class="option-btn selected" data-fmt="md">.md (마크다운)</button>
    <button class="option-btn" data-fmt="txt">.txt (텍스트)</button>
  </div>
</div>

<!-- 변환 버튼 -->
<div id="convertWrap" style="display:none;">
  <button class="btn btn-primary" id="convertBtn" style="width:100%;">텍스트 변환 시작</button>
</div>

<!-- 진행률 -->
<div class="progress-section" id="progressSection">
  <div class="progress-info">
    <span id="progressLabel">준비 중...</span>
    <span id="progressPercent">0%</span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="progress-status" id="progressStatus"></div>
</div>

<!-- 결과 -->
<div class="result-section" id="resultSection">
  <div class="result-header">
    <span class="result-title">변환 결과</span>
    <span class="result-chars" id="resultChars"></span>
  </div>
  <textarea class="result-text" id="resultText" placeholder="변환된 텍스트가 여기에 표시됩니다..."></textarea>

  <div class="btn-row" style="margin-top: 14px;">
    <button class="btn btn-primary" id="downloadBtn">다운로드</button>
    <button class="btn btn-secondary" id="copyBtn">텍스트 복사</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// pdf.js 워커 설정
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var pageBlobs = [];   // OCR에 넘길 blob 배열
var pageThumbs = [];  // 미리보기용 URL 배열
var selectedLang = 'kor+eng';
var selectedFormat = 'md';
var isProcessing = false;

// ──────────────────────────
// 업로드 영역
// ──────────────────────────
var uploadArea = document.getElementById('uploadArea');
var fileInput = document.getElementById('fileInput');

uploadArea.addEventListener('click', function() {
  if (!isProcessing) fileInput.click();
});

fileInput.addEventListener('change', function(e) {
  handleFiles(e.target.files);
  fileInput.value = '';
});

uploadArea.addEventListener('dragover', function(e) {
  e.preventDefault();
  uploadArea.classList.add('dragover');
});

uploadArea.addEventListener('dragleave', function() {
  uploadArea.classList.remove('dragover');
});

uploadArea.addEventListener('drop', function(e) {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});

async function handleFiles(fileList) {
  for (var i = 0; i < fileList.length; i++) {
    var file = fileList[i];

    if (file.type === 'application/pdf') {
      await extractPdfPages(file);
    } else if (file.type.startsWith('image/')) {
      var url = URL.createObjectURL(file);
      pageBlobs.push(file);
      pageThumbs.push(url);
    }
  }
  renderPreviews();
}

// ──────────────────────────
// PDF → 이미지 변환
// ──────────────────────────
async function extractPdfPages(file) {
  try {
    var arrayBuf = await file.arrayBuffer();
    var pdf = await pdfjsLib.getDocument({ data: arrayBuf }).promise;
    var totalPages = pdf.numPages;

    showToast('PDF ' + totalPages + '페이지 로딩 중...');

    for (var p = 1; p <= totalPages; p++) {
      var page = await pdf.getPage(p);
      var scale = 2.0;  // 고해상도 렌더링
      var viewport = page.getViewport({ scale: scale });

      var canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      var ctx = canvas.getContext('2d');

      await page.render({ canvasContext: ctx, viewport: viewport }).promise;

      var blob = await new Promise(function(resolve) {
        canvas.toBlob(function(b) { resolve(b); }, 'image/png');
      });

      var url = URL.createObjectURL(blob);
      pageBlobs.push(blob);
      pageThumbs.push(url);
    }
  } catch (err) {
    showToast('PDF 읽기 오류');
    console.error(err);
  }
}

// 추가/삭제
document.getElementById('addMoreBtn').addEventListener('click', function() {
  fileInput.click();
});

document.getElementById('clearBtn').addEventListener('click', function() {
  pageThumbs.forEach(function(u) { URL.revokeObjectURL(u); });
  pageBlobs = [];
  pageThumbs = [];
  renderPreviews();
  document.getElementById('resultSection').style.display = 'none';
});

// ──────────────────────────
// 미리보기
// ──────────────────────────
function renderPreviews() {
  var section = document.getElementById('previewSection');
  var list = document.getElementById('previewList');
  var optionsSection = document.getElementById('optionsSection');
  var convertWrap = document.getElementById('convertWrap');

  if (pageBlobs.length === 0) {
    section.style.display = 'none';
    optionsSection.style.display = 'none';
    convertWrap.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  optionsSection.style.display = 'block';
  convertWrap.style.display = 'block';
  document.getElementById('previewCount').textContent = pageBlobs.length + '장';

  list.innerHTML = '';
  pageBlobs.forEach(function(blob, idx) {
    var div = document.createElement('div');
    div.className = 'preview-item';

    var img = document.createElement('img');
    img.src = pageThumbs[idx];

    var num = document.createElement('div');
    num.className = 'page-num';
    num.textContent = (idx + 1) + '/' + pageBlobs.length;

    var removeBtn = document.createElement('button');
    removeBtn.className = 'remove-btn';
    removeBtn.innerHTML = '&times;';
    removeBtn.addEventListener('click', (function(i) {
      return function() {
        URL.revokeObjectURL(pageThumbs[i]);
        pageBlobs.splice(i, 1);
        pageThumbs.splice(i, 1);
        renderPreviews();
      };
    })(idx));

    div.appendChild(img);
    div.appendChild(num);
    div.appendChild(removeBtn);
    list.appendChild(div);
  });
}

// ──────────────────────────
// 옵션 선택
// ──────────────────────────
document.getElementById('langList').addEventListener('click', function(e) {
  var btn = e.target.closest('.option-btn');
  if (!btn) return;
  document.querySelectorAll('#langList .option-btn').forEach(function(b) { b.classList.remove('selected'); });
  btn.classList.add('selected');
  selectedLang = btn.dataset.lang;
});

document.getElementById('formatList').addEventListener('click', function(e) {
  var btn = e.target.closest('.option-btn');
  if (!btn) return;
  document.querySelectorAll('#formatList .option-btn').forEach(function(b) { b.classList.remove('selected'); });
  btn.classList.add('selected');
  selectedFormat = btn.dataset.fmt;
});

// ──────────────────────────
// 이미지 전처리 (최소한만 — Tesseract 자체 처리에 맡김)
// ──────────────────────────
function preprocessImage(blob) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var ctx = canvas.getContext('2d');

      // 해상도 확대 (300 DPI 이상 확보)
      // 책 사진은 보통 1000~2000px → 3000px 이상으로
      var scale = 1;
      if (img.width < 2000) scale = 3;
      else if (img.width < 3000) scale = 2;

      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      // 고품질 보간으로 그리기
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      // 그레이스케일만 적용 (이진화 하지 않음 — Tesseract가 알아서 함)
      var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      var data = imageData.data;

      for (var i = 0; i < data.length; i += 4) {
        var gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;

        // 아주 부드러운 대비 강화만 (1.2배)
        gray = ((gray - 128) * 1.2) + 128;
        if (gray < 0) gray = 0;
        if (gray > 255) gray = 255;

        data[i] = gray;
        data[i+1] = gray;
        data[i+2] = gray;
      }

      ctx.putImageData(imageData, 0, 0);

      canvas.toBlob(function(b) {
        URL.revokeObjectURL(img.src);
        resolve(b);
      }, 'image/png');
    };
    img.src = URL.createObjectURL(blob);
  });
}

// ──────────────────────────
// 텍스트 후처리
// ──────────────────────────
function cleanText(text) {
  var lines = text.split('\n');
  var cleaned = [];

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();

    // 빈 줄은 문단 구분으로 유지
    if (line === '') {
      cleaned.push('');
      continue;
    }

    // 의미 있는 문자(한글, 영어, 숫자) 비율 계산
    var meaningful = (line.match(/[가-힣a-zA-Z0-9]/g) || []).length;
    var total = line.length;
    var ratio = meaningful / total;

    // 의미있는 문자가 30% 미만인 줄은 쓰레기 (도형, 기호, 워터마크)
    if (ratio < 0.3 && total > 2) continue;

    // 숫자만 있는 줄 (페이지 번호, 워터마크 숫자)
    if (/^\s*[\d\s\-|.]+\s*$/.test(line)) continue;

    // 3글자 이하이고 의미없는 내용 (기호, 단일 문자)
    if (total <= 3 && ratio < 0.5) continue;

    // 도형/테이블 문자 제거 (박스 드로잉, 화살표 등)
    line = line.replace(/[─│┌┐└┘├┤┬┴┼━┃╋▶▷►▸◀◁◄◂△▽▲▼○●◎□■◇◆☆★→←↑↓↔⇒⇐⇑⇓]/g, '');

    // 깨진 따옴표 정리
    line = line.replace(/[""‟„]/g, '"');
    line = line.replace(/[''‛‚]/g, "'");

    // 한글 사이에 끼어든 의미없는 특수문자
    line = line.replace(/([가-힣])[|l]{1,2}([가-힣])/g, '$1$2');

    // 연속 특수문자 (3개 이상) 제거
    line = line.replace(/[^\w가-힣a-zA-Z0-9\s.,;:!?'"()\-]{3,}/g, '');

    // 줄 시작의 쓸데없는 특수문자
    line = line.replace(/^[|l\-_=+*#~`]+\s*/, '');

    // 정리 후 빈 줄이면 스킵
    line = line.replace(/\s+/g, ' ').trim();
    if (line === '') continue;

    cleaned.push(line);
  }

  // 줄바꿈 이어붙이기: 문장 중간에서 끊긴 줄을 합침
  var result = [];
  var buffer = '';

  for (var j = 0; j < cleaned.length; j++) {
    var cur = cleaned[j];

    // 빈 줄 = 문단 구분
    if (cur === '') {
      if (buffer) {
        result.push(buffer);
        buffer = '';
      }
      result.push('');
      continue;
    }

    if (buffer === '') {
      buffer = cur;
    } else {
      // 이전 줄이 문장 끝(마침표, 물음표, 느낌표, 따옴표+마침표)으로 끝나면 새 줄
      var endsWithPeriod = /[.。!?…」】\)'"》]$/.test(buffer);
      // 현재 줄이 새 문단 시작처럼 보이면 (숫자+점, 대시, 불릿 등)
      var startsNewParagraph = /^[\d]+[.)]\s|^[-•·]\s|^[A-Z][A-Z]|^제\d|^Chapter|^PART/i.test(cur);

      if (endsWithPeriod || startsNewParagraph) {
        result.push(buffer);
        buffer = cur;
      } else {
        // 문장 중간이면 이어붙이기
        buffer += ' ' + cur;
      }
    }
  }
  if (buffer) result.push(buffer);

  // 최종 정리
  var final = result.join('\n');

  // 연속 빈줄 정리
  final = final.replace(/\n{3,}/g, '\n\n');

  return final.trim();
}

// ──────────────────────────
// OCR 변환
// ──────────────────────────
document.getElementById('convertBtn').addEventListener('click', startConvert);

async function startConvert() {
  if (pageBlobs.length === 0 || isProcessing) return;
  isProcessing = true;

  var convertBtn = document.getElementById('convertBtn');
  convertBtn.disabled = true;
  convertBtn.textContent = '변환 중...';

  var progressSection = document.getElementById('progressSection');
  var resultSection = document.getElementById('resultSection');
  progressSection.style.display = 'block';
  resultSection.style.display = 'none';

  updateProgress(0, pageBlobs.length, '엔진 로딩 중...');

  var allText = [];

  try {
    var worker = await Tesseract.createWorker(selectedLang, 1, {
      logger: function(m) {
        if (m.status === 'loading tesseract core') {
          updateProgress(0, pageBlobs.length, 'OCR 엔진 로딩 중...');
        } else if (m.status === 'loading language traineddata') {
          updateProgress(0, pageBlobs.length, '언어 데이터 로딩 중...');
        }
      }
    });

    // Tesseract 파라미터 최적화
    await worker.setParameters({
      tessedit_pageseg_mode: '6',       // 단일 텍스트 블록으로 인식 (책 페이지에 최적)
      preserve_interword_spaces: '1',   // 단어 간 공백 보존
    });

    for (var i = 0; i < pageBlobs.length; i++) {
      updateProgress(i, pageBlobs.length, (i + 1) + '/' + pageBlobs.length + ' 전처리 중...');

      var processed = await preprocessImage(pageBlobs[i]);

      updateProgress(i, pageBlobs.length, (i + 1) + '/' + pageBlobs.length + ' OCR 처리 중...');

      var result = await worker.recognize(processed);
      var text = cleanText(result.data.text);

      if (text) {
        if (selectedFormat === 'md') {
          allText.push('<!-- 페이지 ' + (i + 1) + ' -->\n\n' + text);
        } else {
          allText.push('[페이지 ' + (i + 1) + ']\n\n' + text);
        }
      }

      // 메모리 해제
      processed = null;
    }

    await worker.terminate();
  } catch (err) {
    showToast('변환 중 오류가 발생했습니다');
    console.error(err);
  }

  var separator = selectedFormat === 'md' ? '\n\n---\n\n' : '\n\n────────────\n\n';
  var combined = allText.join(separator);
  document.getElementById('resultText').value = combined;
  document.getElementById('resultChars').textContent = combined.length + '자';

  progressSection.style.display = 'none';
  resultSection.style.display = 'block';

  convertBtn.disabled = false;
  convertBtn.textContent = '다시 변환';
  isProcessing = false;

  if (combined.length > 0) {
    showToast(pageBlobs.length + '장 변환 완료!');
  } else {
    showToast('텍스트를 인식하지 못했습니다');
  }

  setTimeout(function() {
    resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function updateProgress(current, total, status) {
  var pct = total > 0 ? Math.round((current / total) * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressPercent').textContent = pct + '%';
  document.getElementById('progressLabel').textContent = current + ' / ' + total + ' 완료';
  document.getElementById('progressStatus').textContent = status || '';
}

// ──────────────────────────
// 다운로드
// ──────────────────────────
document.getElementById('downloadBtn').addEventListener('click', function() {
  var text = document.getElementById('resultText').value;
  if (!text.trim()) {
    showToast('다운로드할 텍스트가 없습니다');
    return;
  }

  var ext = selectedFormat === 'md' ? '.md' : '.txt';
  var mimeType = selectedFormat === 'md' ? 'text/markdown;charset=utf-8' : 'text/plain;charset=utf-8';

  var blob = new Blob([text], { type: mimeType });
  var url = URL.createObjectURL(blob);

  var now = new Date();
  var y = now.getFullYear();
  var m = String(now.getMonth() + 1).padStart(2, '0');
  var d = String(now.getDate()).padStart(2, '0');
  var h = String(now.getHours()).padStart(2, '0');
  var min = String(now.getMinutes()).padStart(2, '0');
  var filename = 'book-scan-' + y + m + d + '-' + h + min + ext;

  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showToast('다운로드 완료');
});

// ──────────────────────────
// 복사
// ──────────────────────────
document.getElementById('copyBtn').addEventListener('click', function() {
  var text = document.getElementById('resultText').value;
  if (!text.trim()) {
    showToast('복사할 텍스트가 없습니다');
    return;
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showToast('클립보드에 복사했어요');
    }).catch(function() {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
});

function fallbackCopy(text) {
  var ta = document.getElementById('resultText');
  ta.select();
  ta.setSelectionRange(0, ta.value.length);
  try {
    document.execCommand('copy');
    showToast('클립보드에 복사했어요');
  } catch (e) {
    showToast('복사에 실패했습니다');
  }
}

// ──────────────────────────
// 토스트
// ──────────────────────────
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2200);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function() {});
}
</script>

</html>
